services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      BOUNDARY_CACHE_ENABLED: "true"
      BOUNDARY_CACHE_DSN: "postgresql://mcp_geo:mcp_geo@postgis:5432/mcp_geo"
      BOUNDARY_CACHE_FALLBACK_LIVE: "true"
      BOUNDARY_CACHE_MAX_AGE_DAYS: "180"
      ROUTE_GRAPH_ENABLED: "true"
      ROUTE_GRAPH_DSN: "postgresql://mcp_geo:mcp_geo@postgis:5432/mcp_geo"
      ADMIN_LOOKUP_LIVE_ENABLED: "true"
      MCP_GEO_LIVE_DB_DSN: "postgresql://mcp_geo:mcp_geo@postgis:5432/mcp_geo"
      ONS_DATASET_CACHE_DIR: "/var/lib/mcp-geo/cache/ons"
      ONS_GEO_CACHE_DIR: "/var/lib/mcp-geo/cache/ons_geo"
      OS_DATA_CACHE_DIR: "/var/lib/mcp-geo/cache/os"
      UI_EVENT_LOG_PATH: "/var/lib/mcp-geo/logs/ui-events.jsonl"
      PLAYGROUND_EVENT_LOG_PATH: "/var/lib/mcp-geo/logs/playground-events.jsonl"
    volumes:
      - ..:/workspaces/mcp-geo:cached
      - runtime-data:/var/lib/mcp-geo
    command: sleep infinity
    depends_on:
      - postgis

  postgis:
    image: "${MCP_GEO_POSTGIS_IMAGE:-mcp-geo-postgis-pgrouting:16-3.4}"
    build:
      context: ..
      dockerfile: .devcontainer/postgis.Dockerfile
    platform: "${MCP_GEO_POSTGIS_PLATFORM:-linux/amd64}"
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcp_geo
      POSTGRES_USER: mcp_geo
      POSTGRES_PASSWORD: mcp_geo
      PGDATA: /var/lib/postgresql/data/pgdata
    # Host port is optional. Default to a random free port to avoid conflicts
    # when multiple devcontainers (or local Postgres) are running.
    #
    # To pin it, export `MCP_GEO_POSTGIS_HOST_PORT=5433` before starting the
    # devcontainer.
    ports:
      - "${MCP_GEO_POSTGIS_HOST_PORT:-0}:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data

volumes:
  postgis-data:
    name: "${MCP_GEO_POSTGIS_VOLUME:-mcp-geo-postgis}"
  runtime-data:
    name: "${MCP_GEO_RUNTIME_DATA_VOLUME:-mcp-geo-runtime-data}"
