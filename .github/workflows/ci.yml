name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: Run the playground live-smoke suite against the real backend
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,boundaries]"

      - name: Ruff (repo-supported static gates)
        run: |
          ruff check \
            server/mcp/tools.py \
            tools/os_mcp.py \
            tools/os_peat.py \
            tests/test_os_peat.py \
            tests/test_psr_peat_e2e.py \
            tests/test_evaluation_harness_full.py \
            tests/test_os_mcp_route_query.py

      - name: Mypy (repo-supported static gates)
        run: |
          mypy --follow-imports=skip \
            server/mcp/tools.py \
            server/mcp/resource_catalog.py \
            tools/os_mcp.py \
            tools/os_peat.py \
            tests/test_os_peat.py \
            tests/test_psr_peat_e2e.py \
            tests/test_evaluation_harness_full.py \
            tests/test_os_mcp_route_query.py

      - name: Pytest
        run: pytest -q -m "not integration"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install playground dependencies
        run: npm --prefix playground ci

      - name: Build playground
        run: npm --prefix playground run build

      - name: Install Playwright Chromium
        run: npx --prefix playground playwright install --with-deps chromium

      - name: Playwright playground full suite
        run: npm --prefix playground run test:full

      - name: Upload playground full-suite artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playground-full-suite-artifacts
          path: playground/test-results/full
          if-no-files-found: ignore

  frontend-live-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_smoke }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: pip install -e ".[dev,boundaries]"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install playground dependencies
        run: npm --prefix playground ci

      - name: Install Playwright Chromium
        run: npx --prefix playground playwright install --with-deps chromium

      - name: Playwright playground live smoke
        run: npm --prefix playground run test:live
        env:
          OS_API_KEY: ${{ secrets.OS_API_KEY }}
          ONS_API_KEY: ${{ secrets.ONS_API_KEY }}

      - name: Upload playground live-smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playground-live-smoke-artifacts
          path: playground/test-results/live
          if-no-files-found: ignore

  docker-validate:
    needs:
      - test
      - frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    needs: docker-validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
