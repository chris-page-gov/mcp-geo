name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev,boundaries]"

      - name: Ruff (repo-supported static gates)
        run: |
          ruff check \
            server/mcp/tools.py \
            tools/os_mcp.py \
            tools/os_peat.py \
            tests/test_os_peat.py \
            tests/test_psr_peat_e2e.py \
            tests/test_evaluation_harness_full.py \
            tests/test_os_mcp_route_query.py

      - name: Mypy (repo-supported static gates)
        run: |
          mypy --follow-imports=skip \
            server/mcp/tools.py \
            server/mcp/resource_catalog.py \
            tools/os_mcp.py \
            tools/os_peat.py \
            tests/test_os_peat.py \
            tests/test_psr_peat_e2e.py \
            tests/test_evaluation_harness_full.py \
            tests/test_os_mcp_route_query.py

      - name: Pytest
        run: pytest -q -m "not integration"

  owasp-mcp-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install validator dependencies
        run: |
          pip install -e ".[dev,boundaries]" pip-audit
          mkdir -p artifacts/owasp-mcp

      - name: Secret scan (gitleaks)
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            dir /repo \
            --report-format json \
            --report-path /repo/artifacts/owasp-mcp/gitleaks.json \
            --redact

      - name: Dependency audit (pip-audit)
        id: pip_audit
        continue-on-error: true
        run: |
          pip-audit --progress-spinner off --format json > artifacts/owasp-mcp/pip-audit.json

      - name: Run OWASP MCP validator
        id: owasp_validate
        continue-on-error: true
        run: |
          python scripts/validate_owasp_mcp_server.py \
            --profile prod-strict \
            --format both \
            --output-dir artifacts/owasp-mcp \
            --fail-on required

      - name: Upload OWASP MCP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-mcp-validation
          path: artifacts/owasp-mcp/
          if-no-files-found: error

      - name: Enforce OWASP security gates
        if: always()
        env:
          GITLEAKS_OUTCOME: ${{ steps.gitleaks.outcome }}
          PIP_AUDIT_OUTCOME: ${{ steps.pip_audit.outcome }}
          OWASP_VALIDATE_OUTCOME: ${{ steps.owasp_validate.outcome }}
        run: |
          test "$GITLEAKS_OUTCOME" = "success"
          test "$PIP_AUDIT_OUTCOME" = "success"
          test "$OWASP_VALIDATE_OUTCOME" = "success"

  supply-chain-posture:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload Scorecard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openssf-scorecard
          path: scorecard-results.sarif
          if-no-files-found: error

  docker-validate:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    needs: docker-validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
