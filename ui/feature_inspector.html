<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Geo - Feature Inspector</title>
    <style>
      :root {
        --bg-1: #f3f8f5;
        --bg-2: #f2f2f7;
        --ink: #182018;
        --muted: #55625a;
        --accent: #2f7d4f;
        --accent-2: #9ad4b2;
        --panel: rgba(255, 255, 255, 0.9);
        --line: rgba(24, 32, 24, 0.12);
        --shadow: 0 22px 50px rgba(25, 35, 25, 0.18);
        --radius: 18px;
        --font: "Sora", "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--ink);
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      }

      .shell {
        padding: 24px;
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .title {
        font-size: 28px;
        font-weight: 600;
      }

      .subtitle {
        font-size: 14px;
        color: var(--muted);
      }

      .badge {
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(47, 125, 79, 0.15);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        background: var(--panel);
        border-radius: var(--radius);
        padding: 18px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        animation: slide 0.6s ease-out both;
      }

      .panel h3 {
        margin: 0 0 12px;
        font-size: 15px;
      }

      .prop {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px dashed var(--line);
        font-size: 13px;
      }

      .prop span:last-child {
        color: var(--muted);
      }

      .map {
        background: var(--panel);
        border-radius: var(--radius);
        padding: 18px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        min-height: 360px;
        position: relative;
        overflow: hidden;
        animation: slide 0.6s ease-out 0.1s both;
      }

      .map::before {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: 14px;
        background:
          linear-gradient(120deg, rgba(47, 125, 79, 0.18), transparent 50%),
          repeating-linear-gradient(
            45deg,
            rgba(24, 32, 24, 0.08) 0px,
            rgba(24, 32, 24, 0.08) 1px,
            transparent 1px,
            transparent 18px
          );
      }

      .linked {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
      }

      .chip {
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(47, 125, 79, 0.12);
        font-size: 12px;
        color: var(--accent);
      }

      .payload {
        margin-top: 16px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(24, 32, 24, 0.05);
        font-size: 12px;
        color: var(--muted);
        height: 120px;
        overflow: auto;
        white-space: pre-wrap;
      }

      @keyframes slide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 960px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <div class="title">Feature Inspector</div>
          <div class="subtitle">Review properties, geometry, and linked identifiers.</div>
        </div>
        <div class="badge">Inspector</div>
      </header>

      <section class="grid">
        <div class="panel">
          <h3>Key properties</h3>
          <div class="prop"><span>Feature ID</span><span>osgb1000000</span></div>
          <div class="prop"><span>Collection</span><span>bld-fts-buildingpart</span></div>
          <div class="prop"><span>Status</span><span>active</span></div>
          <div class="prop"><span>Last updated</span><span>2025-01-10</span></div>
          <div class="linked">
            <div class="chip">TOID: 1234</div>
            <div class="chip">UPRN: 5678</div>
            <div class="chip">USRN: 9012</div>
          </div>
          <div id="payload" class="payload">Waiting for MCP host payload...</div>
        </div>

        <div class="map">
          <div class="badge" style="position: absolute; top: 32px; left: 32px">Map view</div>
        </div>
      </section>
    </div>

    <script>
      const payload = document.getElementById("payload");
      window.addEventListener("message", (event) => {
        if (!event || !event.data) {
          return;
        }
        payload.textContent = JSON.stringify(event.data, null, 2);
      });
    </script>
  </body>
</html>
