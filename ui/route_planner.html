<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Geo - Route Planner</title>
    <link rel="stylesheet" href="shared/compact_contract.css" />
    <style>
      :root {
        --bg-1: #eef5ff;
        --bg-2: #f8f1e9;
        --ink: #1b2330;
        --muted: #5a677a;
        --accent: #2e6de6;
        --accent-2: #f59f5a;
        --panel: rgba(255, 255, 255, 0.9);
        --line: rgba(27, 35, 48, 0.12);
        --shadow: 0 24px 55px rgba(27, 35, 48, 0.2);
        --radius: 18px;
        --font: "Work Sans", "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--ink);
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg-1) 40%, var(--bg-2) 100%);
      }

      .shell {
        padding: 24px;
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .title {
        font-size: 28px;
        font-weight: 600;
      }

      .subtitle {
        font-size: 14px;
        color: var(--muted);
      }

      .badge {
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(46, 109, 230, 0.15);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
        gap: 20px;
        margin-top: 22px;
      }

      .map {
        background: var(--panel);
        border-radius: var(--radius);
        padding: 18px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        min-height: 360px;
        position: relative;
        overflow: hidden;
        animation: rise 0.6s ease-out;
      }

      .map::before {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: 14px;
        background:
          linear-gradient(120deg, rgba(46, 109, 230, 0.18), transparent 50%),
          linear-gradient(220deg, rgba(245, 159, 90, 0.2), transparent 45%),
          repeating-linear-gradient(
            0deg,
            rgba(27, 35, 48, 0.08) 0px,
            rgba(27, 35, 48, 0.08) 1px,
            transparent 1px,
            transparent 26px
          );
      }

      .panel {
        background: var(--panel);
        border-radius: var(--radius);
        padding: 18px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        animation: rise 0.6s ease-out 0.1s both;
      }

      .panel h3 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }

      .field input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        font-size: 14px;
      }

      .cta {
        width: 100%;
        padding: 12px 16px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(120deg, var(--accent), #1f4fb5);
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }

      .steps {
        margin-top: 14px;
        display: grid;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      .payload {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(27, 35, 48, 0.05);
        font-size: 12px;
        color: var(--muted);
        height: 120px;
        overflow: auto;
        white-space: pre-wrap;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 960px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell" data-compact-shell>
      <header data-compact-header>
        <div>
          <div class="title">Route Planner</div>
          <div class="subtitle">Plot a route and review turn by turn steps.</div>
        </div>
        <div class="badge" id="statusBadge" data-testid="status-strip">Routing</div>
      </header>

      <section class="grid" data-compact-grid>
        <div class="map" data-compact-panel data-compact-map data-testid="map-stage">
          <div class="badge" style="position: absolute; top: 32px; left: 32px">Route map</div>
        </div>

        <aside class="panel" data-compact-panel>
          <h3>Route inputs</h3>
          <div class="field">
            <label>Start</label>
            <input placeholder="Start coordinates or name" />
          </div>
          <div class="field">
            <label>End</label>
            <input placeholder="End coordinates or name" />
          </div>
          <button class="cta" id="calculateRoute" type="button" data-testid="primary-cta" data-compact-cta>
            Calculate route
          </button>
          <div class="steps">
            <div>1. Head north on Example Road</div>
            <div>2. Turn right onto Sample Street</div>
            <div>3. Arrive at destination</div>
          </div>
          <div id="payload" class="payload">Waiting for MCP host payload...</div>
        </aside>
      </section>
    </div>

    <script src="shared/compact_contract.js"></script>
    <script>
      const statusBadge = document.getElementById("statusBadge");
      const payload = document.getElementById("payload");
      const calculateRoute = document.getElementById("calculateRoute");
      const compactContract = window.MCP_GEO_COMPACT
        ? window.MCP_GEO_COMPACT.init({
            uiId: "route_planner",
            statusSelector: "#statusBadge",
            ctaSelector: "#calculateRoute",
          })
        : null;
      let lastMessage = { info: "Waiting for MCP host payload..." };

      calculateRoute.addEventListener("click", () => {
        const now = new Date().toISOString();
        statusBadge.textContent = "Route requested";
        payload.textContent = JSON.stringify({ requestedAt: now, lastMessage }, null, 2);
      });

      window.addEventListener("message", (event) => {
        if (!event || !event.data) {
          return;
        }
        lastMessage = event.data;
        payload.textContent = JSON.stringify(event.data, null, 2);
        statusBadge.textContent = "Payload received";
      });
    </script>
  </body>
</html>
